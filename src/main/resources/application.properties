# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
# All values come from environment variables (set in .env locally, or in the
# hosting platform in production). Never hardcode credentials here.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# update: auto-creates or alters tables to match entities (good for early dev)
# Change to "validate" or "none" before going to production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── CORS / Frontend ───────────────────────────────────────────────────────────
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

