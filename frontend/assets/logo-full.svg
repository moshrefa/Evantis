<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 445 100" role="img" aria-label="Evantis — Where your vision becomes beautiful reality.">
  <defs>
    <clipPath id="f-cl">
      <circle cx="-22" cy="0" r="52"/>
    </clipPath>
    <clipPath id="f-cr">
      <circle cx="22" cy="0" r="52"/>
    </clipPath>
  </defs>

  <!-- ── Mark: centered at (62, 50), scaled to ~78% ── -->
  <g transform="translate(62,50) scale(0.78)">

    <!-- Intersection fill -->
    <circle cx="22" cy="0" r="52"
            clip-path="url(#f-cl)"
            fill="#b8894a" fill-opacity="0.22"/>

    <!-- Intersection border highlights -->
    <circle cx="-22" cy="0" r="52"
            clip-path="url(#f-cr)"
            fill="none" stroke="#b8894a" stroke-width="2.2" stroke-opacity="0.45"/>
    <circle cx="22" cy="0" r="52"
            clip-path="url(#f-cl)"
            fill="none" stroke="#b8894a" stroke-width="2.2" stroke-opacity="0.45"/>

    <!-- Main circles -->
    <circle cx="-22" cy="0" r="52"
            fill="none" stroke="#b8894a" stroke-width="1.2"/>
    <circle cx="22" cy="0" r="52"
            fill="none" stroke="#b8894a" stroke-width="1.2"/>

    <!-- Inner dashed rings -->
    <circle cx="-22" cy="0" r="42"
            fill="none" stroke="#b8894a" stroke-width="0.7"
            stroke-opacity="0.3" stroke-dasharray="2 5"/>
    <circle cx="22" cy="0" r="42"
            fill="none" stroke="#b8894a" stroke-width="0.7"
            stroke-opacity="0.3" stroke-dasharray="2 5"/>

    <!-- Italic e -->
    <text x="0" y="0"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="26" font-style="italic"
          fill="#b8894a"
          text-anchor="middle" dominant-baseline="central">e</text>
  </g>

  <!-- ── Wordmark ── -->
  <!-- Business name -->
  <text x="130" y="46"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36"
        font-style="italic"
        fill="#f2ede4"
        dominant-baseline="auto">Evantis</text>

  <!-- Thin separator line -->
  <line x1="130" y1="57" x2="368" y2="57"
        stroke="#b8894a" stroke-width="0.6"/>

  <!-- Tagline -->
  <text x="130" y="73"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11"
        font-style="italic"
        fill="#b8894a"
        letter-spacing="1">Where your vision becomes beautiful reality.</text>
</svg>
