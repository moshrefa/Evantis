# ── Local Development Overrides ───────────────────────────────────────────────
# This file is loaded when SPRING_PROFILES_ACTIVE=dev
# It overrides values in application.properties for local dev only.
# Never commit real credentials here.

# Show SQL in console during development
spring.jpa.show-sql=true

# More verbose logging locally
logging.level.com.evantis=DEBUG
logging.level.org.springframework.web=DEBUG

# Allow Hibernate to create tables freely in local dev
spring.jpa.hibernate.ddl-auto=update
